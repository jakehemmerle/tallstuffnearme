name: Deploy Staging

on:
  push:
    branches: [master]

env:
  GCP_PROJECT: tallshitnearme-app
  GCP_REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/tallshitnearme-app/tallshitnearme
  ENVIRONMENT: staging

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tallshit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/tallshit_test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Push prisma schema
        run: bunx --bun prisma db push
      - name: Generate prisma client
        run: bunx --bun prisma generate
      - name: Run backend tests
        run: bun test --testPathPattern '\.test\.ts$' --testPathIgnorePatterns 'e2e'

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      # Run prisma migration
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run prisma db push
        run: |
          cd infra && bun install && cd ..
          DB_URL=$(pulumi -C infra stack output stagingDbUrl -s shared --show-secrets)
          DATABASE_URL="$DB_URL" bunx --bun prisma db push
        env:
          PULUMI_BACKEND_URL: gs://tallshitnearme-pulumi-state
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      # Build and push Docker image with layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate Docker to GCP
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/app:${{ env.ENVIRONMENT }}
            ${{ env.REGISTRY }}/app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy with Pulumi
      - uses: pulumi/actions@v5
        with:
          command: up
          stack-name: staging
          work-dir: infra
        env:
          PULUMI_BACKEND_URL: gs://tallshitnearme-pulumi-state
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      # Force new revision with the latest image
      - name: Deploy new revision
        run: |
          gcloud run services update tallshit-staging-app \
            --image=${REGISTRY}/app:${GITHUB_SHA} \
            --region=${GCP_REGION} \
            --project=${GCP_PROJECT}
